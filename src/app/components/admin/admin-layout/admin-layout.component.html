<div class="admin-container">
  <!-- Sidebar -->
  <aside class="admin-sidebar" [class.collapsed]="isSidebarCollapsed">
    <!-- Logo -->
    <div class="sidebar-header">
      <div class="logo" *ngIf="!isSidebarCollapsed">
        <span class="material-icons logo-icon">music_note</span>
        <span class="logo-text">Admin Panel</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span class="material-icons">{{ isSidebarCollapsed ? 'chevron_right' : 'chevron_left' }}</span>
      </button>
    </div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
      <a 
        *ngFor="let item of menuItems" 
        [routerLink]="item.route"
        class="nav-item"
        [class.active]="isActive(item.route)"
        [title]="item.title">
        <span class="material-icons nav-icon">{{ item.icon }}</span>
        <span class="nav-text" *ngIf="!isSidebarCollapsed">{{ item.title }}</span>
        <span class="badge" *ngIf="item.badge && !isSidebarCollapsed">{{ item.badge }}</span>
      </a>
    </nav>

    <!-- User Section -->
    <div class="sidebar-footer">
      <div class="user-info" *ngIf="currentUser && !isSidebarCollapsed">
        <div class="user-avatar">
          <span class="material-icons">admin_panel_settings</span>
        </div>
        <div class="user-details">
          <span class="user-name">{{ currentUser.firstName }}</span>
          <span class="user-role">{{ userRoleLabel }}</span>
        </div>
      </div>
      
      <button class="btn-action" (click)="goToStore()" [title]="'Ver Tienda'">
        <span class="material-icons">storefront</span>
        <span *ngIf="!isSidebarCollapsed">Ver Tienda</span>
      </button>
      
      <button class="btn-logout" (click)="logout()" [title]="'Cerrar Sesión'">
        <span class="material-icons">logout</span>
        <span *ngIf="!isSidebarCollapsed">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main" [class.expanded]="isSidebarCollapsed">
    <!-- Top Bar -->
    <header class="admin-topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" (click)="toggleSidebar()">
          <span class="material-icons">menu</span>
        </button>
        <div class="module-header">
          <div class="module-icon">
            <span class="material-icons">{{ currentModuleHeader.icon }}</span>
          </div>
          <div class="module-text">
            <span class="module-title">{{ currentModuleHeader.title }}</span>
            <span class="module-subtitle" *ngIf="currentModuleHeader.subtitle">
              {{ currentModuleHeader.subtitle }}
            </span>
          </div>
        </div>
      </div>
      
      <div class="topbar-right">
        <div class="module-action-group" *ngIf="canShowAnyModuleAction || isActive('/admin/products')">
          <!-- Botón secundario (ej. "Actualizar" en Clientes) -->
          <button
            *ngIf="currentModuleHeader.secondaryActionLabel && canShowSecondaryModuleAction"
            class="module-action-btn module-action-btn--secondary"
            (click)="triggerSecondaryModuleAction()">
            <span class="material-icons">{{ currentModuleHeader.secondaryActionIcon || 'refresh' }}</span>
            <span>{{ currentModuleHeader.secondaryActionLabel }}</span>
          </button>

          <!-- Botón CSV: solo visible en la sección de Productos -->
          <app-csv-import-export
            *ngIf="isActive('/admin/products')"
            moduleType="products"
            (importSuccess)="triggerSecondaryModuleAction()">
          </app-csv-import-export>

          <!-- Botón de acción principal (ej. "Nuevo Producto") -->
          <button
            *ngIf="currentModuleHeader.actionLabel && canShowModuleAction"
            class="module-action-btn"
            (click)="triggerModuleAction()">
            <span class="material-icons">{{ currentModuleHeader.actionIcon || 'add' }}</span>
            <span>{{ currentModuleHeader.actionLabel }}</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="admin-content" [class.admin-content--flush]="activeRoute.includes('/gestion-db')">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
