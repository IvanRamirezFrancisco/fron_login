<!-- ═══════════════════════════════════════════════════════════════════════
     Admin DB Management — Componente Padre con Tabs
     Ruta: /admin/gestion-db  |  Solo SUPER_ADMIN
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="dbm-root">

  <!-- ── BARRA DE TABS ──────────────────────────────────────────────────── -->
  <nav class="dbm-tabs" role="tablist" aria-label="Módulos de gestión de base de datos">
    <button
      *ngFor="let tab of tabs"
      role="tab"
      class="dbm-tab"
      [class.dbm-tab--active]="activeTab === tab.value"
      [attr.aria-selected]="activeTab === tab.value"
      (click)="changeTab(tab.value)">
      <span class="material-icons dbm-tab__icon">{{ tab.icon }}</span>
      <span class="dbm-tab__label">{{ tab.label }}</span>
    </button>
  </nav>

  <!-- ── CONTENIDO DINÁMICO ─────────────────────────────────────────────── -->
  <div class="dbm-content" role="tabpanel">

    @if (activeTab === 'backups') {
      <app-admin-backups></app-admin-backups>
    }

    @if (activeTab === 'monitoring') {
      <app-admin-db-monitoring></app-admin-db-monitoring>
    }

    @if (activeTab === 'maintenance') {
      <app-admin-db-maintenance></app-admin-db-maintenance>
    }

    @if (activeTab === 'queries') {
      <app-admin-db-queries></app-admin-db-queries>
    }

  </div>

</div>
